<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boas-vindas!</title>
    <script>
        function saudar() {
            const nome = prompt("Qual é o seu nome?");
            if (nome) {
                alert(`Olá, ${nome}! Seja muito bem-vindo(a) ao nosso portal! 🚀`);
            }
        }
    </script>
</head>
<body onload="saudar()">
    <h1>Página Inicial</h1>
    <p>O conteúdo do seu site começa aqui.</p>
</body>
</html>
